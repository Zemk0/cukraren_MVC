server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Serve static files; fallback to index.html for client-side navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
