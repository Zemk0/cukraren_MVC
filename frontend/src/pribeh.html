<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Príbeh Cukrárne Janka">
    <title>Príbeh - Cukráreň Janka</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="header_nav"></div>

    <section class="page-header">
        <div class="container">
            <h1 id="page-title"></h1>
            <p id="page-subtitle"></p>
        </div>
    </section>

    <main class="main-content">
        <section class="story-section section-padding">
            <div class="container">
                <div class="story-content">
                    <div class="story-image">
                        <img id="story-image" src="" alt="">
                    </div>
                    <div class="story-text">
                        <h2 id="story-title"></h2>
                        <div id="story-paragraphs"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="timeline-section section-padding bg-light">
            <div class="container">
                <h2 class="section-title">Naša História</h2>
                <div id="timeline" class="timeline"></div>
            </div>
        </section>

        <section class="values-section section-padding">
            <div class="container">
                <h2 class="section-title">Naše Hodnoty</h2>
                <div id="values-grid" class="values-grid"></div>
            </div>
        </section>

        <section class="team-section section-padding bg-light">
            <div class="container">
                <h2 class="section-title">Náš Tím</h2>
                <div id="team-grid" class="team-grid"></div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/pribeh.js"></script>
</body>
</html>
