<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kontakt - Cukráreň Janka">
    <title>Kontakt - Cukráreň Janka</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="header_nav"></div>

    <section class="page-header">
        <div class="container">
            <h1>Kontakt</h1>
            <p>Navštívte nás alebo nás kontaktujte</p>
        </div>
    </section>

    <main class="main-content">
        <section class="contact-section section-padding">
            <div class="container">
                <div class="contact-info-centered">
                    <h2>Kontaktné Informácie</h2>

                    <div class="contact-item">
                        <h3>📍 Adresa</h3>
                        <p id="contact-address">Načítavam...</p>
                    </div>

                    <div class="contact-item">
                        <h3>📞 Telefón</h3>
                        <p><a id="contact-phone" href="#">Načítavam...</a></p>
                    </div>

                    <div class="contact-item">
                        <h3>✉️ Email</h3>
                        <p><a id="contact-email" href="#">Načítavam...</a></p>
                    </div>

                    <div class="contact-item">
                        <h3>🕐 Otváracie Hodiny</h3>
                        <table class="hours-table">
                            <tr><td>Pondelok - Piatok:</td><td><strong id="hours-weekdays">—</strong></td></tr>
                            <tr><td>Sobota:</td>          <td><strong id="hours-saturday">—</strong></td></tr>
                            <tr><td>Nedeľa:</td>          <td><strong id="hours-sunday">—</strong></td></tr>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section class="map-section">
            <div class="map-container">
                <div class="map-placeholder">
                    <div class="map-overlay">
                        <h3 id="shop-name">—</h3>
                        <p id="shop-city">—</p>
                        <a id="map-link" href="#" target="_blank" class="btn-secondary">Otvoriť v Mapách</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/kontakt.js"></script>
</body>
</html>
