<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prihlásenie - Admin - Cukráreň Janka</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--color-bg, #fdf6ee);
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .login-logo h1 {
            font-size: 1.4rem;
            margin: 0.25rem 0 0;
            color: var(--color-primary, #8b5e3c);
        }

        .login-logo p {
            color: var(--color-text-medium, #777);
            font-size: 0.875rem;
            margin: 0.25rem 0 0;
        }

        .login-step { display: none; }
        .login-step.active { display: block; }

        .login-step h2 {
            font-size: 1.1rem;
            margin: 0 0 1.25rem;
            color: var(--color-text, #333);
        }

        .step-indicator {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            transition: background 0.3s;
        }

        .step-dot.active { background: var(--color-primary, #8b5e3c); }

        .login-form .admin-form-group { margin-bottom: 1rem; }

        .login-form label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: var(--color-text, #333);
        }

        .login-form input {
            width: 100%;
            padding: 0.65rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--color-primary, #8b5e3c);
        }

        .totp-hint {
            font-size: 0.8rem;
            color: var(--color-text-medium, #777);
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .totp-input-wrapper {
            display: flex;
            gap: 0.5rem;
        }

        .totp-input-wrapper input {
            flex: 1;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 0.4rem;
            font-weight: 700;
            padding: 0.65rem 0.5rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-primary, #8b5e3c);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn-login:hover { background: var(--color-primary-dark, #6e4a2e); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-back {
            background: none;
            border: none;
            color: var(--color-primary, #8b5e3c);
            cursor: pointer;
            font-size: 0.875rem;
            padding: 0;
            margin-top: 0.75rem;
            display: block;
            text-align: center;
            width: 100%;
        }

        .login-error {
            background: #fde8e8;
            color: #c0392b;
            border-radius: 6px;
            padding: 0.65rem 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .login-error.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <h1>Cukráreň Janka</h1>
            <p>Admin Panel</p>
        </div>

        <div class="step-indicator">
            <div class="step-dot active" id="dot-1"></div>
            <div class="step-dot"        id="dot-2"></div>
        </div>

        <div id="login-error" class="login-error"></div>

        <!-- Step 1: username + password -->
        <div class="login-step active" id="step-password">
            <h2>Prihlásenie</h2>
            <div class="login-form">
                <div class="admin-form-group">
                    <label for="username">Meno</label>
                    <input type="text" id="username" autocomplete="username"
                           placeholder="admin" autofocus>
                </div>
                <div class="admin-form-group">
                    <label for="password">Heslo</label>
                    <input type="password" id="password" autocomplete="current-password"
                           placeholder="••••••••">
                </div>
                <button class="btn-login" id="btn-login">Pokračovať →</button>
            </div>
        </div>

        <!-- Step 2: TOTP -->
        <div class="login-step" id="step-totp">
            <h2>Overenie totožnosti</h2>
            <p class="totp-hint">
                Zadajte 6-ciferný kód z vašej autentifikačnej aplikácie
                (Google Authenticator, Authy a pod.).
            </p>
            <div class="login-form">
                <div class="admin-form-group">
                    <label for="totp-code">Kód autentifikátora</label>
                    <div class="totp-input-wrapper">
                        <input type="text" id="totp-code"
                               inputmode="numeric" pattern="\d{6}"
                               maxlength="6" autocomplete="one-time-code"
                               placeholder="000000">
                    </div>
                </div>
                <button class="btn-login" id="btn-totp">Prihlásiť sa</button>
                <button class="btn-back"  id="btn-back">← Späť</button>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        let partialToken = null;

        const stepPassword = document.getElementById('step-password');
        const stepTotp     = document.getElementById('step-totp');
        const dot1         = document.getElementById('dot-1');
        const dot2         = document.getElementById('dot-2');
        const errorBox     = document.getElementById('login-error');

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.add('visible');
        }

        function clearError() {
            errorBox.textContent = '';
            errorBox.classList.remove('visible');
        }

        function setLoading(btn, loading) {
            btn.disabled = loading;
            btn.textContent = loading
                ? 'Čakajte…'
                : (btn.id === 'btn-totp' ? 'Prihlásiť sa' : 'Pokračovať →');
        }

        function goToStep2() {
            stepPassword.classList.remove('active');
            stepTotp.classList.add('active');
            dot1.classList.remove('active');
            dot2.classList.add('active');
            clearError();
            setTimeout(() => document.getElementById('totp-code').focus(), 50);
        }

        function goToStep1() {
            stepTotp.classList.remove('active');
            stepPassword.classList.add('active');
            dot2.classList.remove('active');
            dot1.classList.add('active');
            clearError();
            partialToken = null;
        }

        // Step 1 — password
        document.getElementById('btn-login').addEventListener('click', async () => {
            clearError();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btn-login');

            if (!username || !password) {
                showError('Vyplňte meno aj heslo.');
                return;
            }

            setLoading(btn, true);
            try {
                const res  = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.message ?? 'Nesprávne prihlasovacie údaje.');
                    return;
                }

                partialToken = data.partialToken;
                goToStep2();
            } catch {
                showError('Chyba spojenia so serverom.');
            } finally {
                setLoading(btn, false);
            }
        });

        // Allow Enter key on password field
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btn-login').click();
        });

        // Step 2 — TOTP
        document.getElementById('btn-totp').addEventListener('click', async () => {
            clearError();
            const code = document.getElementById('totp-code').value.replace(/\s/g, '');
            const btn  = document.getElementById('btn-totp');

            if (!/^\d{6}$/.test(code)) {
                showError('Zadajte presne 6-ciferný kód.');
                return;
            }

            setLoading(btn, true);
            try {
                const res  = await fetch('/api/auth/totp', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ partialToken, totpCode: code }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.message ?? 'Nesprávny kód.');
                    document.getElementById('totp-code').value = '';
                    return;
                }

                // Store JWT and redirect
                sessionStorage.setItem('adminToken', data.token);
                sessionStorage.setItem('adminLogged', 'true');
                const redirect = sessionStorage.getItem('redirectAfterLogin') ?? 'admin/index.html';
                sessionStorage.removeItem('redirectAfterLogin');
                window.location.href = redirect;
            } catch {
                showError('Chyba spojenia so serverom.');
            } finally {
                setLoading(btn, false);
            }
        });

        // Auto-submit when 6 digits entered
        document.getElementById('totp-code').addEventListener('input', e => {
            if (e.target.value.replace(/\s/g, '').length === 6) {
                document.getElementById('btn-totp').click();
            }
        });

        document.getElementById('btn-back').addEventListener('click', goToStep1);
    })();
    </script>
</body>
</html>
