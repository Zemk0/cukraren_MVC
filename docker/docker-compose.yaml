services:
  reverse-proxy:
    image: nginx:latest
    container_name: cukraren-rp
    ports:
      - "80:80"
    volumes:
      - ../reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../reverse-proxy/conf.d:/etc/nginx/conf.d:ro
    networks:
      cukraren-network:
        ipv4_address: 172.18.0.2

  frontend:
    image: nginx:latest
    container_name: cukraren-frontend
    volumes:
      - ../frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/src:/usr/share/nginx/html
    networks:
      cukraren-network:
        ipv4_address: 172.18.0.4

  backend:
    build:
      context: ../backend
      dockerfile: ./Dockerfile
    container_name: cukraren-backend
    env_file:
      - .env
    environment:
      - PORT=8080
    volumes:
      - ../backend:/app
    working_dir: /app
    command: [ "sh", "/app/entry_point.sh" ]
    networks:
      cukraren-network:
        ipv4_address: 172.18.0.5

  cukraren-db:
    image: postgres:15
    container_name: cukraren-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ../db/data:/var/lib/postgresql/data
      - ../backend/src/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      cukraren-network:
        ipv4_address: 172.18.0.10

  cukraren-pgadmin:
    image: dpage/pgadmin4
    container_name: cukraren-pgadmin
    env_file:
      - .env
    volumes:
      - ../db/pgadmin:/var/lib/pgadmin
    ports:
      - "8081:80"
    depends_on:
      - cukraren-db
    networks:
      cukraren-network:
        ipv4_address: 172.18.0.11

networks:
  cukraren-network:
    external: true
    name: ssnd
