server {
    listen 80;
    server_name cukraren.local localhost cukraren_janka.sk;

    location /api/auth/setup {
    return 403;
    }
    # API requests → Node.js backend
    location /api/ {
        proxy_pass         http://cukraren-backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Everything else → static frontend
    location / {
        proxy_pass         http://cukraren-frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
server {
    listen 80;
    server_name pgadmin.cukraren.sk;

    location / {
        proxy_pass       http://pgadmin:80/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}